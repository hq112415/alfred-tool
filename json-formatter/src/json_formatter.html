<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSON Formatter</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg-primary: #ffffff;
            --bg-secondary: #f7f8fa;
            --bg-surface: #ffffff;
            --bg-hover: #eef0f4;
            --bg-input: #fafbfc;
            --text-primary: #1d2433;
            --text-secondary: #5a6070;
            --text-muted: #9ca3b0;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --green: #16a34a;
            --red: #dc2626;
            --yellow: #ca8a04;
            --peach: #ea580c;
            --border: #e2e5ea;
            --border-light: #eef0f4;
            --scrollbar-bg: #f3f4f6;
            --scrollbar-thumb: #cbd5e1;
            --key-color: #2563eb;
            --string-color: #16a34a;
            --number-color: #ea580c;
            --bool-color: #9333ea;
            --null-color: #dc2626;
            --bracket-color: #64748b;
            --error-bg: #fef2f2;
            --error-border: #dc2626;
            --error-text: #dc2626;
            --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
            --shadow-md: 0 4px 6px rgba(0,0,0,0.05), 0 2px 4px rgba(0,0,0,0.03);
            --search-highlight: #fef08a;
            --search-current: #fb923c;
            --fold-color: #94a3b8;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif;
            background: var(--bg-secondary);
            color: var(--text-primary);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 20px;
            background: var(--bg-primary);
            border-bottom: 1px solid var(--border);
            box-shadow: var(--shadow);
            -webkit-app-region: drag;
            user-select: none;
            z-index: 10;
        }
        .header-left { display: flex; align-items: center; gap: 10px; }
        .logo {
            width: 28px; height: 28px; background: var(--accent); border-radius: 7px;
            display: flex; align-items: center; justify-content: center;
            color: #fff; font-size: 14px; font-weight: 700; font-family: 'SF Mono', monospace;
        }
        .title { font-size: 14px; font-weight: 600; color: var(--text-primary); }
        .header-right { display: flex; gap: 6px; -webkit-app-region: no-drag; }
        .header-btn {
            padding: 5px 12px; border: 1px solid var(--border); background: var(--bg-primary);
            color: var(--text-secondary); border-radius: 6px; font-size: 12px; cursor: pointer;
            transition: all 0.15s ease; display: flex; align-items: center; gap: 4px;
        }
        .header-btn:hover { background: var(--bg-hover); color: var(--text-primary); border-color: var(--accent); }

        /* Search Bar */
        .search-bar {
            display: none;
            align-items: center;
            gap: 8px;
            padding: 6px 14px;
            background: var(--bg-primary);
            border-bottom: 1px solid var(--border);
            z-index: 9;
        }
        .search-bar.visible { display: flex; }
        .search-bar input {
            flex: 1; padding: 5px 10px; border: 1px solid var(--border); border-radius: 6px;
            font-size: 13px; outline: none; background: var(--bg-input); color: var(--text-primary);
            font-family: 'SF Mono', 'Consolas', monospace;
        }
        .search-bar input:focus { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(59,130,246,0.15); }
        .search-info { font-size: 12px; color: var(--text-muted); min-width: 80px; text-align: center; }
        .search-btn {
            padding: 4px 8px; border: 1px solid var(--border); background: var(--bg-primary);
            color: var(--text-secondary); border-radius: 5px; font-size: 12px; cursor: pointer;
            transition: all 0.15s;
        }
        .search-btn:hover { background: var(--bg-hover); border-color: var(--accent); }
        .search-divider {
            width: 1px; height: 18px; background: var(--border); flex-shrink: 0;
        }
        .search-copy-btn {
            font-size: 11px; padding: 4px 10px; white-space: nowrap;
        }
        .search-copy-btn:disabled { opacity: 0.4; cursor: default; }
        .search-copy-btn:disabled:hover { background: var(--bg-primary); border-color: var(--border); }

        /* Main Layout */
        .main {
            flex: 1; display: flex; overflow: hidden;
            padding: 12px; gap: 12px; background: var(--bg-secondary);
        }
        .panel {
            flex: 1; display: flex; flex-direction: column; min-width: 0;
            background: var(--bg-primary); border-radius: 10px;
            border: 1px solid var(--border); box-shadow: var(--shadow); overflow: hidden;
        }

        /* Divider */
        .divider {
            width: 6px; flex-shrink: 0; cursor: col-resize;
            display: flex; align-items: center; justify-content: center; position: relative;
        }
        .divider::after {
            content: ''; width: 3px; height: 32px; border-radius: 2px;
            background: var(--scrollbar-thumb); transition: background 0.15s;
        }
        .divider:hover::after { background: var(--accent); }

        /* Panel Header */
        .panel-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 8px 14px; background: var(--bg-secondary); border-bottom: 1px solid var(--border-light);
        }
        .panel-title {
            font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.8px;
            color: var(--text-muted); display: flex; align-items: center; gap: 6px;
        }
        .panel-title .dot { width: 6px; height: 6px; border-radius: 50%; }
        .dot.input { background: var(--accent); }
        .dot.output { background: var(--green); }
        .dot.error { background: var(--red); }
        .panel-actions { display: flex; gap: 4px; align-items: center; }
        .panel-badge {
            font-size: 10px; padding: 2px 8px; border-radius: 10px;
            background: var(--bg-primary); color: var(--text-muted); border: 1px solid var(--border-light);
        }
        .panel-icon-btn {
            width: 24px; height: 24px; border: 1px solid var(--border-light); background: var(--bg-primary);
            border-radius: 5px; cursor: pointer; display: flex; align-items: center; justify-content: center;
            font-size: 12px; color: var(--text-muted); transition: all 0.15s;
        }
        .panel-icon-btn:hover { background: var(--bg-hover); color: var(--accent); border-color: var(--accent); }
        .panel-icon-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

        /* Input wrapper for highlight overlay */
        .input-wrapper {
            flex: 1; position: relative; overflow: hidden;
        }
        #inputBackdrop {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            padding: 14px; overflow: auto;
            font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
            font-size: 13px; line-height: 1.65; tab-size: 2;
            white-space: pre-wrap; word-wrap: break-word;
            color: transparent; pointer-events: none; z-index: 0;
            background: var(--bg-input);
        }
        #inputBackdrop .search-match { background: var(--search-highlight); border-radius: 2px; color: transparent; }
        #inputBackdrop .search-match.current { background: var(--search-current); color: transparent; }
        /* Input */
        #jsonInput {
            position: relative; z-index: 1;
            width: 100%; height: 100%;
            padding: 14px; background: transparent; color: var(--text-primary);
            border: none; resize: none;
            font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
            font-size: 13px; line-height: 1.65; outline: none; tab-size: 2; overflow: auto;
        }
        #jsonInput::placeholder { color: var(--text-muted); }
        #jsonInput::-webkit-scrollbar, .output-area::-webkit-scrollbar { width: 6px; }
        #jsonInput::-webkit-scrollbar-track, .output-area::-webkit-scrollbar-track { background: transparent; }
        #jsonInput::-webkit-scrollbar-thumb, .output-area::-webkit-scrollbar-thumb { background: var(--scrollbar-thumb); border-radius: 3px; }

        /* Action Bar */
        .action-bar {
            display: flex; align-items: center; justify-content: space-between;
            padding: 8px 14px; background: var(--bg-secondary); border-top: 1px solid var(--border-light);
        }
        .action-bar-left { display: flex; gap: 8px; align-items: center; }
        .format-btn {
            padding: 6px 20px; background: var(--accent); color: #fff; border: none;
            border-radius: 7px; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.15s ease;
        }
        .format-btn:hover { background: var(--accent-hover); box-shadow: 0 2px 8px rgba(59,130,246,0.25); }
        .format-btn:active { transform: scale(0.97); }
        .indent-select {
            padding: 5px 10px; background: var(--bg-primary); color: var(--text-secondary);
            border: 1px solid var(--border); border-radius: 6px; font-size: 12px; cursor: pointer; outline: none;
        }
        .indent-select:focus { border-color: var(--accent); }
        .char-count { font-size: 11px; color: var(--text-muted); }
        kbd {
            font-family: 'SF Mono', monospace; font-size: 10px; padding: 1px 5px;
            border: 1px solid var(--border); border-radius: 3px; background: var(--bg-secondary); color: var(--text-muted);
        }

        /* Output */
        .output-wrapper { display: flex; flex: 1; overflow: hidden; }
        .output-gutter {
            min-width: 40px; padding: 14px 8px; text-align: right; color: var(--text-muted);
            font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
            font-size: 12px; line-height: 1.65; user-select: none;
            background: var(--bg-secondary); border-right: 1px solid var(--border-light); overflow: hidden;
        }
        .output-gutter .line-num { display: block; }
        .output-gutter .line-num.error-line { color: var(--red); font-weight: 700; }
        .output-area { flex: 1; overflow: auto; background: var(--bg-input); }
        #jsonOutput {
            padding: 14px;
            font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
            font-size: 13px; line-height: 1.65; white-space: pre; min-height: 100%;
        }
        .placeholder-text { color: var(--text-muted); font-style: italic; padding: 14px; font-size: 13px; }

        /* Syntax Highlighting */
        .json-key { color: var(--key-color); }
        .json-string { color: var(--string-color); }
        .json-number { color: var(--number-color); }
        .json-boolean { color: var(--bool-color); }
        .json-null { color: var(--null-color); }
        .json-bracket { color: var(--bracket-color); }
        .json-colon { color: var(--text-muted); }
        .json-comma { color: var(--text-muted); }

        /* Fold/Collapse */
        .fold-toggle {
            display: inline-block; cursor: pointer; user-select: none;
            color: var(--fold-color); font-size: 11px; width: 14px; text-align: center;
            margin-right: 2px; transition: transform 0.15s, color 0.15s;
            vertical-align: middle; font-family: 'SF Mono', monospace; line-height: 1;
        }
        .fold-toggle:hover { color: var(--accent); }
        .fold-toggle.collapsed { transform: rotate(-90deg); }
        .fold-content.collapsed { display: none; }
        .fold-placeholder {
            color: var(--text-muted); font-style: italic; cursor: pointer;
            background: var(--bg-hover); border-radius: 3px; padding: 0 6px; font-size: 12px;
        }
        .fold-placeholder:hover { background: var(--accent); color: #fff; }

        /* Search Highlight */
        .search-match { background: var(--search-highlight); border-radius: 2px; padding: 0 1px; }
        .search-match.current { background: var(--search-current); color: #fff; }

        /* Error */
        .json-error-line {
            background: var(--error-bg); border-left: 3px solid var(--error-border);
            display: inline-block; width: 100%; padding: 0 4px; margin-left: -4px; border-radius: 2px;
        }
        .json-error-char {
            color: var(--error-text); text-decoration: wavy underline;
            text-decoration-color: var(--error-text); font-weight: 700;
        }
        .error-indicator {
            display: none; align-items: center; gap: 8px; padding: 8px 14px;
            background: var(--error-bg); border-bottom: 1px solid rgba(220,38,38,0.15);
            font-size: 12px; color: var(--error-text);
        }
        .error-indicator.visible { display: flex; }
        .error-indicator .error-icon { font-size: 14px; }
        .error-indicator .error-msg { flex: 1; }
        .error-indicator .error-pos {
            font-family: 'SF Mono', monospace; font-size: 11px;
            background: rgba(220,38,38,0.08); padding: 2px 8px; border-radius: 4px; border: 1px solid rgba(220,38,38,0.15);
        }

        /* Status Bar */
        .status-bar {
            display: flex; align-items: center; justify-content: space-between;
            padding: 4px 16px; background: var(--bg-primary); border-top: 1px solid var(--border);
            font-size: 11px; color: var(--text-muted);
        }
        .status-item { display: flex; align-items: center; gap: 5px; }
        .status-dot { width: 5px; height: 5px; border-radius: 50%; }
        .status-dot.valid { background: var(--green); }
        .status-dot.invalid { background: var(--red); }
        .status-dot.empty { background: var(--text-muted); }

        /* Toast */
        .toast {
            position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%) translateY(20px);
            padding: 8px 20px; background: var(--text-primary); color: #fff; border-radius: 8px;
            font-size: 13px; opacity: 0; transition: all 0.25s ease; pointer-events: none;
            box-shadow: var(--shadow-md); z-index: 100;
        }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-left">
            <span class="logo">{ }</span>
            <span class="title">JSON Formatter</span>
        </div>
        <div class="header-right">
            <button class="header-btn" onclick="loadSample()">📋 示例</button>
            <button class="header-btn" onclick="minifyJSON()">📦 压缩</button>
            <button class="header-btn" onclick="copyOutput()">📄 复制</button>
            <button class="header-btn" onclick="clearAll()">🗑 清空</button>
        </div>
    </div>

    <!-- Search Bar -->
    <div class="search-bar" id="searchBar">
        <span style="font-size:13px;">🔍</span>
        <input type="text" id="searchInput" placeholder="搜索..." autocomplete="off" />
        <span class="search-info" id="searchInfo"></span>
        <button class="search-btn" onclick="searchPrev()">▲</button>
        <button class="search-btn" onclick="searchNext()">▼</button>
        <span class="search-divider"></span>
        <button class="search-btn search-copy-btn" id="copyValuesBtn" onclick="copyMatchedValues()" title="复制所有匹配的值">📋 复制值</button>
        <button class="search-btn search-copy-btn" id="copyPairsBtn" onclick="copyMatchedPairs()" title="复制所有匹配的键值对">📋 复制键值</button>
        <button class="search-btn" onclick="closeSearch()">✕</button>
    </div>

    <div class="main">
        <div class="panel" id="leftPanel">
            <div class="panel-header">
                <span class="panel-title"><span class="dot input"></span>输入</span>
                <span class="panel-badge" id="inputSize">0 chars</span>
            </div>
            <div class="input-wrapper">
                <div id="inputBackdrop"></div>
                <textarea id="jsonInput" placeholder="在此粘贴 JSON 字符串...&#10;&#10;支持：&#10;  • 标准 JSON&#10;  • 压缩的 JSON&#10;&#10;快捷键：&#10;  ⌘+Enter  格式化&#10;  ⌘+F  搜索&#10;  ESC  关闭窗口" spellcheck="false"></textarea>
            </div>
            <div class="action-bar">
                <div class="action-bar-left">
                    <button class="format-btn" onclick="formatJSON()">▶ 格式化</button>
                    <select class="indent-select" id="indentSize">
                        <option value="2">2 空格</option>
                        <option value="4">4 空格</option>
                        <option value="tab">Tab</option>
                    </select>
                </div>
                <span class="char-count"><kbd>⌘</kbd>+<kbd>Enter</kbd> 格式化 &nbsp; <kbd>ESC</kbd> 关闭</span>
            </div>
        </div>

        <div class="divider" id="divider"></div>

        <div class="panel" id="rightPanel">
            <div class="panel-header">
                <span class="panel-title" id="outputTitle"><span class="dot output"></span>输出</span>
                <div class="panel-actions">
                    <button class="panel-icon-btn" id="expandAllBtn" onclick="expandAll()" title="全部展开">⊞</button>
                    <button class="panel-icon-btn" id="collapseAllBtn" onclick="collapseAll()" title="全部折叠">⊟</button>
                    <span class="panel-badge" id="outputSize">0 lines</span>
                </div>
            </div>
            <div class="error-indicator" id="errorIndicator">
                <span class="error-icon">⚠️</span>
                <span class="error-msg" id="errorMsg">JSON 格式错误</span>
                <span class="error-pos" id="errorPos"></span>
            </div>
            <div class="output-wrapper">
                <div class="output-gutter" id="outputGutter"></div>
                <div class="output-area" id="outputArea">
                    <div id="jsonOutput" class="placeholder-text">格式化结果将显示在此处...</div>
                </div>
            </div>
        </div>
    </div>

    <div class="status-bar">
        <span class="status-item">
            <span class="status-dot empty" id="statusDot"></span>
            <span id="statusText">等待输入</span>
        </span>
        <span>JSON Formatter v1.1 &nbsp;|&nbsp; <kbd>⌘F</kbd> 搜索 &nbsp; <kbd>ESC</kbd> 关闭</span>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        // ===== DOM Elements =====
        const jsonInput = document.getElementById('jsonInput');
        const inputBackdrop = document.getElementById('inputBackdrop');
        const jsonOutput = document.getElementById('jsonOutput');
        const outputArea = document.getElementById('outputArea');
        const outputGutter = document.getElementById('outputGutter');
        const errorIndicator = document.getElementById('errorIndicator');
        const errorMsg = document.getElementById('errorMsg');
        const errorPos = document.getElementById('errorPos');
        const statusDot = document.getElementById('statusDot');
        const statusText = document.getElementById('statusText');
        const outputTitle = document.getElementById('outputTitle');
        const inputSizeEl = document.getElementById('inputSize');
        const outputSizeEl = document.getElementById('outputSize');
        const searchBar = document.getElementById('searchBar');
        const searchInput = document.getElementById('searchInput');
        const searchInfo = document.getElementById('searchInfo');
        let lastFormattedText = '';
        let lastParsedData = null;
        let isValidJSON = false;

        // ===== Search State =====
        let searchMatches = [];
        let searchCurrentIdx = -1;

        outputArea.addEventListener('scroll', () => { outputGutter.scrollTop = outputArea.scrollTop; });
        jsonInput.addEventListener('scroll', () => {
            inputBackdrop.scrollTop = jsonInput.scrollTop;
            inputBackdrop.scrollLeft = jsonInput.scrollLeft;
        });
        jsonInput.addEventListener('input', () => {
            const len = jsonInput.value.length;
            inputSizeEl.textContent = len > 1000 ? `${(len/1000).toFixed(1)}k chars` : `${len} chars`;
            // update left-side search highlights if search is active
            if (searchBar.classList.contains('visible') && searchInput.value.trim()) {
                highlightInputBackdrop(searchInput.value.trim());
            }
        });

        // ===== JSON Format (Tree with Fold) =====
        function formatJSON() {
            const input = jsonInput.value.trim();
            if (!input) { showToast('请输入 JSON 字符串'); return; }
            const indent = getIndent();
            try {
                const parsed = JSON.parse(input);
                lastParsedData = parsed;
                isValidJSON = true;
                const html = renderJSONTree(parsed, indent);
                displayTreeSuccess(html);
            } catch (e) {
                isValidJSON = false;
                lastParsedData = null;
                handleParseError(input, e, indent);
            }
        }

        function getIndent() {
            const val = document.getElementById('indentSize').value;
            return val === 'tab' ? '\t' : parseInt(val);
        }

        // ===== Tree Renderer with Fold/Collapse =====
        let foldIdCounter = 0;

        function renderJSONTree(data, indent) {
            foldIdCounter = 0;
            const indentStr = indent === '\t' ? '\t' : ' '.repeat(typeof indent === 'number' ? indent : 2);
            const lines = [];
            renderValue(data, lines, 0, indentStr, false);
            lastFormattedText = lines.map(l => l.text).join('\n');
            return buildTreeHTML(lines);
        }

        function renderValue(value, lines, depth, indentStr, trailingComma) {
            const comma = trailingComma ? ',' : '';
            if (value === null) {
                lines.push({ text: indentStr.repeat(depth) + 'null' + comma, html: indent(depth, indentStr) + '<span class="json-null">null</span>' + commaSpan(comma), foldStart: false });
            } else if (typeof value === 'boolean') {
                lines.push({ text: indentStr.repeat(depth) + String(value) + comma, html: indent(depth, indentStr) + '<span class="json-boolean">' + value + '</span>' + commaSpan(comma), foldStart: false });
            } else if (typeof value === 'number') {
                lines.push({ text: indentStr.repeat(depth) + String(value) + comma, html: indent(depth, indentStr) + '<span class="json-number">' + value + '</span>' + commaSpan(comma), foldStart: false });
            } else if (typeof value === 'string') {
                const escaped = escapeHtml(JSON.stringify(value));
                lines.push({ text: indentStr.repeat(depth) + JSON.stringify(value) + comma, html: indent(depth, indentStr) + '<span class="json-string">' + escaped + '</span>' + commaSpan(comma), foldStart: false });
            } else if (Array.isArray(value)) {
                renderArray(value, lines, depth, indentStr, comma);
            } else if (typeof value === 'object') {
                renderObject(value, lines, depth, indentStr, comma);
            }
        }

        function renderObject(obj, lines, depth, indentStr, comma) {
            const keys = Object.keys(obj);
            if (keys.length === 0) {
                lines.push({ text: indentStr.repeat(depth) + '{}' + comma, html: indent(depth, indentStr) + '<span class="json-bracket">{}</span>' + commaSpan(comma), foldStart: false });
                return;
            }
            const foldId = 'fold_' + (foldIdCounter++);
            const preview = getObjectPreview(obj);
            lines.push({
                text: indentStr.repeat(depth) + '{',
                html: indent(depth, indentStr) + '<span class="fold-toggle" data-fold="' + foldId + '" onclick="toggleFold(\'' + foldId + '\')">▼</span><span class="json-bracket">{</span><span class="fold-placeholder" data-fold-ph="' + foldId + '" style="display:none" onclick="toggleFold(\'' + foldId + '\')">' + escapeHtml(preview) + '</span>',
                foldStart: true,
                foldId: foldId
            });
            keys.forEach((key, idx) => {
                const isLast = idx === keys.length - 1;
                const keyStr = JSON.stringify(key);
                const val = obj[key];
                if (val !== null && typeof val === 'object') {
                    // complex value: key on same line as open bracket
                    const subLines = [];
                    renderValue(val, subLines, depth + 1, indentStr, !isLast);
                    // replace first line to prepend key
                    if (subLines.length > 0) {
                        const firstText = subLines[0].text;
                        const firstHtml = subLines[0].html;
                        const keyHtml = indent(depth + 1, indentStr) + '<span class="json-key">' + escapeHtml(keyStr) + '</span><span class="json-colon">: </span>';
                        // strip leading indent from first sub line
                        const strippedHtml = firstHtml.replace(/^(<span class="indent">.*?<\/span>)/, '');
                        subLines[0] = {
                            text: indentStr.repeat(depth + 1) + keyStr + ': ' + firstText.trim(),
                            html: keyHtml + strippedHtml,
                            foldStart: subLines[0].foldStart,
                            foldId: subLines[0].foldId,
                            foldParent: foldId
                        };
                        for (let si = 1; si < subLines.length; si++) {
                            subLines[si].foldParent = subLines[si].foldParent || foldId;
                        }
                        lines.push(...subLines);
                    }
                } else {
                    const valStr = JSON.stringify(val);
                    const trailingComma = isLast ? '' : ',';
                    let valHtml;
                    if (val === null) valHtml = '<span class="json-null">null</span>';
                    else if (typeof val === 'boolean') valHtml = '<span class="json-boolean">' + val + '</span>';
                    else if (typeof val === 'number') valHtml = '<span class="json-number">' + val + '</span>';
                    else valHtml = '<span class="json-string">' + escapeHtml(valStr) + '</span>';
                    lines.push({
                        text: indentStr.repeat(depth + 1) + keyStr + ': ' + valStr + trailingComma,
                        html: indent(depth + 1, indentStr) + '<span class="json-key">' + escapeHtml(keyStr) + '</span><span class="json-colon">: </span>' + valHtml + commaSpan(trailingComma),
                        foldStart: false,
                        foldParent: foldId
                    });
                }
            });
            lines.push({
                text: indentStr.repeat(depth) + '}' + comma,
                html: indent(depth, indentStr) + '<span class="json-bracket">}</span>' + commaSpan(comma),
                foldStart: false,
                foldEnd: foldId,
                foldParent: foldId
            });
        }

        function renderArray(arr, lines, depth, indentStr, comma) {
            if (arr.length === 0) {
                lines.push({ text: indentStr.repeat(depth) + '[]' + comma, html: indent(depth, indentStr) + '<span class="json-bracket">[]</span>' + commaSpan(comma), foldStart: false });
                return;
            }
            const foldId = 'fold_' + (foldIdCounter++);
            const preview = getArrayPreview(arr);
            lines.push({
                text: indentStr.repeat(depth) + '[',
                html: indent(depth, indentStr) + '<span class="fold-toggle" data-fold="' + foldId + '" onclick="toggleFold(\'' + foldId + '\')">▼</span><span class="json-bracket">[</span><span class="fold-placeholder" data-fold-ph="' + foldId + '" style="display:none" onclick="toggleFold(\'' + foldId + '\')">' + escapeHtml(preview) + '</span>',
                foldStart: true,
                foldId: foldId
            });
            arr.forEach((item, idx) => {
                const subLines = [];
                renderValue(item, subLines, depth + 1, indentStr, idx < arr.length - 1);
                for (const sl of subLines) {
                    sl.foldParent = sl.foldParent || foldId;
                    lines.push(sl);
                }
            });
            lines.push({
                text: indentStr.repeat(depth) + ']' + comma,
                html: indent(depth, indentStr) + '<span class="json-bracket">]</span>' + commaSpan(comma),
                foldStart: false,
                foldEnd: foldId,
                foldParent: foldId
            });
        }

        function getObjectPreview(obj) {
            const keys = Object.keys(obj);
            if (keys.length <= 3) return '{ ' + keys.map(k => JSON.stringify(k) + ': ...').join(', ') + ' }';
            return '{ ' + keys.slice(0, 2).map(k => JSON.stringify(k) + ': ...').join(', ') + ', ... } (' + keys.length + ' keys)';
        }

        function getArrayPreview(arr) {
            if (arr.length <= 3) return '[ ... ' + arr.length + ' items ]';
            return '[ ... ' + arr.length + ' items ]';
        }

        function indent(depth, indentStr) {
            return '<span class="indent">' + indentStr.repeat(depth) + '</span>';
        }

        function commaSpan(c) {
            return c ? '<span class="json-comma">,</span>' : '';
        }

        function buildTreeHTML(lines) {
            let html = '';
            for (let i = 0; i < lines.length; i++) {
                const l = lines[i];
                let lineClasses = 'json-line';
                let attrs = '';
                if (l.foldParent) attrs += ' data-fold-parent="' + l.foldParent + '"';
                if (l.foldEnd) attrs += ' data-fold-end="' + l.foldEnd + '"';
                html += '<div class="' + lineClasses + '"' + attrs + '>' + l.html + '</div>';
            }
            return html;
        }

        // ===== Fold/Collapse =====
        function toggleFold(foldId) {
            const toggle = document.querySelector('.fold-toggle[data-fold="' + foldId + '"]');
            const placeholder = document.querySelector('[data-fold-ph="' + foldId + '"]');
            const isCollapsed = toggle.classList.contains('collapsed');

            if (isCollapsed) {
                // expand
                toggle.classList.remove('collapsed');
                toggle.textContent = '▼';
                placeholder.style.display = 'none';
                const children = document.querySelectorAll('[data-fold-parent="' + foldId + '"]');
                children.forEach(el => {
                    el.style.display = '';
                    // if child itself has a fold toggle that is collapsed, keep its children hidden
                    const childToggle = el.querySelector('.fold-toggle.collapsed');
                    if (childToggle) {
                        const childFoldId = childToggle.dataset.fold;
                        // children of collapsed child remain hidden (already are)
                    }
                });
            } else {
                // collapse
                toggle.classList.add('collapsed');
                toggle.textContent = '▶';
                placeholder.style.display = '';
                // hide all descendant lines
                hideDescendants(foldId);
            }
            updateGutterVisibility();
        }

        function hideDescendants(foldId) {
            const children = document.querySelectorAll('[data-fold-parent="' + foldId + '"]');
            children.forEach(el => {
                el.style.display = 'none';
                // recursively hide nested folds
                const nestedToggle = el.querySelector('.fold-toggle');
                if (nestedToggle) {
                    hideDescendants(nestedToggle.dataset.fold);
                }
            });
        }

        function expandAll() {
            document.querySelectorAll('.fold-toggle.collapsed').forEach(t => {
                const foldId = t.dataset.fold;
                t.classList.remove('collapsed');
                t.textContent = '▼';
                const ph = document.querySelector('[data-fold-ph="' + foldId + '"]');
                if (ph) ph.style.display = 'none';
            });
            document.querySelectorAll('.json-line[data-fold-parent]').forEach(el => { el.style.display = ''; });
            updateGutterVisibility();
        }

        function collapseAll() {
            document.querySelectorAll('.fold-toggle').forEach(t => {
                const foldId = t.dataset.fold;
                t.classList.add('collapsed');
                t.textContent = '▶';
                const ph = document.querySelector('[data-fold-ph="' + foldId + '"]');
                if (ph) ph.style.display = '';
                hideDescendants(foldId);
            });
            updateGutterVisibility();
        }

        function updateGutterVisibility() {
            const lineEls = document.querySelectorAll('#jsonOutput .json-line');
            let gutterHTML = '';
            let visibleCount = 0;
            lineEls.forEach((el, idx) => {
                const lineNum = idx + 1;
                if (el.style.display === 'none') {
                    // hidden line - gutter also hidden
                } else {
                    visibleCount++;
                    gutterHTML += '<span class="line-num">' + lineNum + '</span>';
                }
            });
            outputGutter.innerHTML = gutterHTML;
        }

        // ===== Display Success (Tree) =====
        function displayTreeSuccess(html) {
            jsonOutput.className = '';
            jsonOutput.innerHTML = html;
            const lineCount = document.querySelectorAll('#jsonOutput .json-line').length;
            updateGutterVisibility();
            errorIndicator.classList.remove('visible');
            outputTitle.innerHTML = '<span class="dot output"></span>输出';
            outputSizeEl.textContent = lineCount + ' lines';
            statusDot.className = 'status-dot valid';
            statusText.textContent = '✓ JSON 有效';
            showToast('✓ 格式化成功');
        }

        // ===== Error Handling (kept from original, flat display) =====
        function syntaxHighlight(json) {
            json = json.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
            return json.replace(
                /("(\\u[a-fA-F0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?)/g,
                function(match) {
                    let cls = 'json-number';
                    if (/^"/.test(match)) {
                        if (/:$/.test(match)) {
                            cls = 'json-key';
                            return '<span class="' + cls + '">' + match.slice(0, -1) + '</span><span class="json-colon">:</span>';
                        } else { cls = 'json-string'; }
                    } else if (/true|false/.test(match)) { cls = 'json-boolean'; }
                    else if (/null/.test(match)) { cls = 'json-null'; }
                    return '<span class="' + cls + '">' + match + '</span>';
                }
            );
        }

        function renderGutter(count, errorLines = new Set()) {
            let html = '';
            for (let i = 1; i <= count; i++) {
                const cls = errorLines.has(i) ? 'line-num error-line' : 'line-num';
                html += '<span class="' + cls + '">' + i + '</span>';
            }
            outputGutter.innerHTML = html;
        }

        function handleParseError(input, error, indent) {
            const errorInfo = parseErrorPosition(error.message, input);
            const { formatted, errorLineNumbers } = bestEffortFormat(input, indent, errorInfo);
            lastFormattedText = stripHtml(formatted);
            const lines = formatted.split('\n');
            jsonOutput.className = '';
            jsonOutput.innerHTML = lines.join('\n');
            renderGutter(lines.length, errorLineNumbers);
            errorIndicator.classList.add('visible');
            errorMsg.textContent = simplifyErrorMessage(error.message);
            if (errorInfo.line > 0) {
                errorPos.textContent = '行 ' + errorInfo.line + ', 列 ' + errorInfo.column;
                errorPos.style.display = '';
            } else { errorPos.style.display = 'none'; }
            outputTitle.innerHTML = '<span class="dot error"></span>输出 (含错误)';
            outputSizeEl.textContent = lines.length + ' lines';
            statusDot.className = 'status-dot invalid';
            statusText.textContent = '✗ JSON 无效';
            showToast('⚠ JSON 格式有误，已尽力格式化');
        }

        function parseErrorPosition(errorMessage, input) {
            let line = -1, column = -1, position = -1;
            const posMatch = errorMessage.match(/position\s+(\d+)/i);
            if (posMatch) {
                position = parseInt(posMatch[1]);
                const upToPos = input.substring(0, position);
                const linesUpTo = upToPos.split('\n');
                line = linesUpTo.length;
                column = linesUpTo[linesUpTo.length - 1].length + 1;
            }
            const lineColMatch = errorMessage.match(/line\s+(\d+)\s+column\s+(\d+)/i);
            if (lineColMatch) { line = parseInt(lineColMatch[1]); column = parseInt(lineColMatch[2]); }
            return { line, column, position };
        }

        function bestEffortFormat(input, indent, errorInfo) {
            const indentStr = indent === '\t' ? '\t' : ' '.repeat(typeof indent === 'number' ? indent : 2);
            const errorLineNumbers = new Set();
            let result = [];
            let depth = 0, inString = false, escaped = false, currentLine = '', inputLine = 1, inputCol = 0, hasError = false, i = 0;
            const errorPosition = errorInfo.position >= 0 ? errorInfo.position : -1;

            function addLine(content, isError) {
                const lineContent = indentStr.repeat(depth) + content;
                if (isError) { result.push('<span class="json-error-line">' + lineContent + '</span>'); errorLineNumbers.add(result.length); }
                else { result.push(syntaxHighlight(lineContent)); }
            }
            function pushCurrent(isError) {
                if (currentLine.trim()) { addLine(currentLine.trim(), isError); currentLine = ''; }
            }

            while (i < input.length) {
                const ch = input[i]; inputCol++;
                if (ch === '\n') { inputLine++; inputCol = 0; }
                const atError = (errorPosition >= 0 && i === errorPosition) || (errorInfo.line > 0 && inputLine === errorInfo.line && inputCol === errorInfo.column);
                if (atError && !hasError) hasError = true;
                if (inString) {
                    if (escaped) { currentLine += ch; escaped = false; }
                    else if (ch === '\\') { currentLine += ch; escaped = true; }
                    else if (ch === '"') { currentLine += ch; inString = false; }
                    else { currentLine += ch; }
                    i++; continue;
                }
                if (/\s/.test(ch)) { i++; continue; }
                switch (ch) {
                    case '{': case '[':
                        currentLine += ch; pushCurrent(hasError); if (hasError) hasError = false; depth++; break;
                    case '}': case ']':
                        pushCurrent(hasError); if (hasError) hasError = false; depth = Math.max(0, depth - 1);
                        currentLine += ch;
                        let nextNonWs = findNextNonWhitespace(input, i + 1);
                        if (nextNonWs === ',') { currentLine += ','; i = input.indexOf(',', i + 1); }
                        pushCurrent(hasError); break;
                    case ',': currentLine += ch; pushCurrent(hasError); if (hasError) hasError = false; break;
                    case ':': currentLine += ': '; break;
                    case '"': inString = true; currentLine += ch; break;
                    default:
                        if (atError) currentLine += '<span class="json-error-char">' + escapeHtml(ch) + '</span>';
                        else currentLine += escapeHtml(ch);
                        break;
                }
                i++;
            }
            pushCurrent(hasError);
            if (errorLineNumbers.size === 0 && errorInfo.line > 0) {
                const t = Math.min(errorInfo.line, result.length);
                if (t > 0) { result[t-1] = '<span class="json-error-line">' + stripSpanWrapper(result[t-1]) + '</span>'; errorLineNumbers.add(t); }
            }
            if (errorLineNumbers.size === 0 && result.length > 0) {
                const l = result.length;
                result[l-1] = '<span class="json-error-line">' + stripSpanWrapper(result[l-1]) + '</span>'; errorLineNumbers.add(l);
            }
            return { formatted: result.join('\n'), errorLineNumbers };
        }

        function findNextNonWhitespace(str, startIdx) { for (let i = startIdx; i < str.length; i++) { if (!/\s/.test(str[i])) return str[i]; } return null; }
        function stripSpanWrapper(html) {
            if (html.startsWith('<span class="json-error-line">')) return html.slice('<span class="json-error-line">'.length, -'</span>'.length);
            return html;
        }
        function escapeHtml(str) { return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }
        function stripHtml(html) { const t = document.createElement('div'); t.innerHTML = html; return t.textContent || t.innerText || ''; }
        function simplifyErrorMessage(msg) {
            if (msg.includes('Unexpected token')) { const t = msg.match(/Unexpected token (.)/); return '意外的字符 "' + (t ? t[1] : '?') + '"'; }
            if (msg.includes('Unexpected end')) return 'JSON 未完整结束';
            if (msg.includes('Unterminated string')) return '字符串未闭合';
            return msg;
        }

        // ===== Search =====
        function openSearch() {
            searchBar.classList.add('visible');
            searchInput.focus();
            searchInput.select();
        }

        function closeSearch() {
            searchBar.classList.remove('visible');
            clearSearchHighlights();
            clearInputHighlights();
            searchMatches = [];
            searchCurrentIdx = -1;
            searchInfo.textContent = '';
        }

        function performSearch() {
            clearSearchHighlights();
            clearInputHighlights();
            const query = searchInput.value.trim();
            if (!query) { searchInfo.textContent = ''; searchMatches = []; searchCurrentIdx = -1; return; }

            // === Right side: search in #jsonOutput ===
            const outputEl = document.getElementById('jsonOutput');
            searchMatches = [];
            searchCurrentIdx = -1;

            const walker = document.createTreeWalker(outputEl, NodeFilter.SHOW_TEXT, null, false);
            const textNodes = [];
            while (walker.nextNode()) textNodes.push(walker.currentNode);

            const queryLower = query.toLowerCase();
            for (const node of textNodes) {
                const text = node.textContent;
                const textLower = text.toLowerCase();
                let startIdx = 0;
                while (true) {
                    const idx = textLower.indexOf(queryLower, startIdx);
                    if (idx === -1) break;
                    searchMatches.push({ node, offset: idx, length: query.length });
                    startIdx = idx + 1;
                }
            }

            if (searchMatches.length > 0) {
                highlightMatches();
                searchCurrentIdx = 0;
                scrollToMatch(searchCurrentIdx);
            }

            // === Left side: highlight in input backdrop ===
            highlightInputBackdrop(query);

            updateSearchInfo();
        }

        // Highlight left-side textarea via backdrop
        function highlightInputBackdrop(query) {
            const text = jsonInput.value;
            if (!text || !query) { inputBackdrop.innerHTML = ''; return; }
            const queryLower = query.toLowerCase();
            const textLower = text.toLowerCase();
            let html = '';
            let lastIdx = 0;
            while (true) {
                const idx = textLower.indexOf(queryLower, lastIdx);
                if (idx === -1) break;
                html += escapeHtml(text.substring(lastIdx, idx));
                html += '<span class="search-match">' + escapeHtml(text.substring(idx, idx + query.length)) + '</span>';
                lastIdx = idx + query.length;
            }
            html += escapeHtml(text.substring(lastIdx));
            inputBackdrop.innerHTML = html;
            // sync scroll
            inputBackdrop.scrollTop = jsonInput.scrollTop;
            inputBackdrop.scrollLeft = jsonInput.scrollLeft;
        }

        function clearInputHighlights() {
            inputBackdrop.innerHTML = '';
        }

        // ===== Search Copy: Values & Key-Value Pairs =====
        // Recursively find all key-value pairs where key matches the search query
        function findMatchingEntries(data, query, path) {
            const results = [];
            const queryLower = query.toLowerCase();
            if (data === null || typeof data !== 'object') return results;

            if (Array.isArray(data)) {
                data.forEach((item, idx) => {
                    results.push(...findMatchingEntries(item, query, path + '[' + idx + ']'));
                });
            } else {
                for (const key of Object.keys(data)) {
                    const keyLower = key.toLowerCase();
                    if (keyLower.includes(queryLower)) {
                        results.push({ key: key, value: data[key], path: path + '.' + key });
                    }
                    // recurse into nested objects/arrays
                    if (data[key] !== null && typeof data[key] === 'object') {
                        results.push(...findMatchingEntries(data[key], query, path + '.' + key));
                    }
                }
            }
            return results;
        }

        function formatValue(val) {
            if (val === null) return 'null';
            if (typeof val === 'string') return val;
            if (typeof val === 'object') return JSON.stringify(val);
            return String(val);
        }

        function formatValueForPair(val) {
            if (val === null) return 'null';
            if (typeof val === 'string') return JSON.stringify(val);
            if (typeof val === 'object') return JSON.stringify(val);
            return String(val);
        }

        function copyMatchedValues() {
            const query = searchInput.value.trim();
            if (!query || !lastParsedData) { showToast('无搜索结果'); return; }
            const entries = findMatchingEntries(lastParsedData, query, '$');
            if (entries.length === 0) { showToast('未找到匹配的键'); return; }
            const text = entries.map(e => formatValue(e.value)).join('\n');
            copyToClipboard(text);
            showToast('✓ 已复制 ' + entries.length + ' 个值');
        }

        function copyMatchedPairs() {
            const query = searchInput.value.trim();
            if (!query || !lastParsedData) { showToast('无搜索结果'); return; }
            const entries = findMatchingEntries(lastParsedData, query, '$');
            if (entries.length === 0) { showToast('未找到匹配的键'); return; }
            const text = entries.map(e => '"' + e.key + '": ' + formatValueForPair(e.value)).join('\n');
            copyToClipboard(text);
            showToast('✓ 已复制 ' + entries.length + ' 个键值对');
        }

        function copyToClipboard(text) {
            navigator.clipboard.writeText(text).then(() => {}).catch(() => {
                const ta = document.createElement('textarea');
                ta.value = text; document.body.appendChild(ta); ta.select();
                document.execCommand('copy'); document.body.removeChild(ta);
            });
        }

        function highlightMatches() {
            // process matches from end to beginning within each node
            const grouped = new Map();
            for (const m of searchMatches) {
                if (!grouped.has(m.node)) grouped.set(m.node, []);
                grouped.get(m.node).push(m);
            }
            const newMatches = [];
            for (const [node, matches] of grouped) {
                matches.sort((a, b) => b.offset - a.offset);
                let currentNode = node;
                for (const m of matches) {
                    const range = document.createRange();
                    range.setStart(currentNode, m.offset);
                    range.setEnd(currentNode, m.offset + m.length);
                    const span = document.createElement('span');
                    span.className = 'search-match';
                    range.surroundContents(span);
                    newMatches.push(span);
                }
            }
            // re-collect in order
            searchMatches = [];
            document.querySelectorAll('#jsonOutput .search-match').forEach(el => searchMatches.push(el));
        }

        function clearSearchHighlights() {
            document.querySelectorAll('#jsonOutput .search-match').forEach(el => {
                const parent = el.parentNode;
                while (el.firstChild) parent.insertBefore(el.firstChild, el);
                parent.removeChild(el);
                parent.normalize();
            });
        }

        function searchNext() {
            if (searchMatches.length === 0) return;
            searchCurrentIdx = (searchCurrentIdx + 1) % searchMatches.length;
            scrollToMatch(searchCurrentIdx);
            updateSearchInfo();
        }

        function searchPrev() {
            if (searchMatches.length === 0) return;
            searchCurrentIdx = (searchCurrentIdx - 1 + searchMatches.length) % searchMatches.length;
            scrollToMatch(searchCurrentIdx);
            updateSearchInfo();
        }

        function scrollToMatch(idx) {
            searchMatches.forEach((el, i) => {
                if (i === idx) el.classList.add('current');
                else el.classList.remove('current');
            });
            if (searchMatches[idx]) {
                searchMatches[idx].scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
        }

        function updateSearchInfo() {
            const inputMatchCount = inputBackdrop.querySelectorAll('.search-match').length;
            const outputMatchCount = searchMatches.length;
            const total = inputMatchCount + outputMatchCount;
            if (total === 0) {
                searchInfo.textContent = '无结果';
            } else if (outputMatchCount > 0) {
                searchInfo.textContent = (searchCurrentIdx + 1) + ' / ' + outputMatchCount + ' (右侧)';
            } else {
                searchInfo.textContent = inputMatchCount + ' 处匹配 (左侧)';
            }
            // update copy buttons state
            const query = searchInput.value.trim();
            const copyValuesBtn = document.getElementById('copyValuesBtn');
            const copyPairsBtn = document.getElementById('copyPairsBtn');
            const hasEntries = query && lastParsedData && findMatchingEntries(lastParsedData, query, '$').length > 0;
            copyValuesBtn.disabled = !hasEntries;
            copyPairsBtn.disabled = !hasEntries;
        }

        searchInput.addEventListener('input', () => { performSearch(); });
        searchInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') { e.preventDefault(); if (e.shiftKey) searchPrev(); else searchNext(); }
            if (e.key === 'Escape') { e.preventDefault(); closeSearch(); }
        });

        // ===== Utility Functions =====
        function minifyJSON() {
            const input = jsonInput.value.trim();
            if (!input) { showToast('请先输入 JSON'); return; }
            try {
                const parsed = JSON.parse(input);
                jsonInput.value = JSON.stringify(parsed);
                jsonInput.dispatchEvent(new Event('input'));
                formatJSON();
                showToast('✓ 已压缩');
            } catch (e) { showToast('⚠ JSON 无效，无法压缩'); }
        }

        function copyOutput() {
            if (!lastFormattedText) { showToast('没有可复制的内容'); return; }
            navigator.clipboard.writeText(lastFormattedText).then(() => {
                showToast('✓ 已复制到剪贴板');
            }).catch(() => {
                const ta = document.createElement('textarea');
                ta.value = lastFormattedText; document.body.appendChild(ta); ta.select();
                document.execCommand('copy'); document.body.removeChild(ta);
                showToast('✓ 已复制到剪贴板');
            });
        }

        function clearAll() {
            jsonInput.value = '';
            jsonOutput.className = 'placeholder-text';
            jsonOutput.innerHTML = '格式化结果将显示在此处...';
            outputGutter.innerHTML = '';
            errorIndicator.classList.remove('visible');
            outputTitle.innerHTML = '<span class="dot output"></span>输出';
            inputSizeEl.textContent = '0 chars';
            outputSizeEl.textContent = '0 lines';
            statusDot.className = 'status-dot empty';
            statusText.textContent = '等待输入';
            lastFormattedText = '';
            lastParsedData = null;
            isValidJSON = false;
            jsonInput.focus();
        }

        function loadSample() {
            const sample = {
                "name": "JSON Formatter",
                "version": "1.0.0",
                "description": "一个强大的 JSON 格式化工具",
                "features": ["格式化", "语法高亮", "错误检测", "折叠展开", "搜索"],
                "author": { "name": "Alfred Plugin", "email": "example@test.com" },
                "settings": { "indent": 2, "theme": "light", "autoFormat": true },
                "data": [
                    { "id": 1, "title": "任务一", "done": false },
                    { "id": 2, "title": "任务二", "done": true },
                    { "id": 3, "title": "任务三", "done": false }
                ],
                "tags": null,
                "count": 42,
                "active": true
            };
            jsonInput.value = JSON.stringify(sample);
            jsonInput.dispatchEvent(new Event('input'));
            formatJSON();
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }

        // ===== Keyboard Shortcuts =====
        document.addEventListener('keydown', (e) => {
            // ESC - close window (send message to Swift host)
            if (e.key === 'Escape') {
                if (searchBar.classList.contains('visible')) {
                    closeSearch();
                } else {
                    try { window.webkit.messageHandlers.closeWindow.postMessage('close'); } catch(ex) { window.close(); }
                }
                e.preventDefault();
                return;
            }
            // ⌘+F - search
            if ((e.metaKey || e.ctrlKey) && e.key === 'f') { e.preventDefault(); openSearch(); return; }
            // ⌘+Enter - format
            if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') { e.preventDefault(); formatJSON(); }
            // ⌘+Shift+M - minify
            if ((e.metaKey || e.ctrlKey) && e.shiftKey && (e.key === 'm' || e.key === 'M')) { e.preventDefault(); minifyJSON(); }
            // ⌘+Shift+C - copy
            if ((e.metaKey || e.ctrlKey) && e.shiftKey && (e.key === 'c' || e.key === 'C')) { e.preventDefault(); copyOutput(); }
        });

        // ===== Resizable Divider =====
        (function() {
            const divider = document.getElementById('divider');
            const leftPanel = document.getElementById('leftPanel');
            const rightPanel = document.getElementById('rightPanel');
            let isResizing = false;
            divider.addEventListener('mousedown', (e) => {
                isResizing = true; document.body.style.cursor = 'col-resize'; document.body.style.userSelect = 'none'; e.preventDefault();
            });
            document.addEventListener('mousemove', (e) => {
                if (!isResizing) return;
                const rect = document.querySelector('.main').getBoundingClientRect();
                const ratio = Math.max(0.2, Math.min(0.8, (e.clientX - rect.left) / rect.width));
                leftPanel.style.flex = ratio; rightPanel.style.flex = 1 - ratio;
            });
            document.addEventListener('mouseup', () => {
                if (isResizing) { isResizing = false; document.body.style.cursor = ''; document.body.style.userSelect = ''; }
            });
        })();

        // ===== Drag & Drop =====
        jsonInput.addEventListener('dragover', (e) => { e.preventDefault(); jsonInput.style.borderColor = 'var(--accent)'; });
        jsonInput.addEventListener('dragleave', () => { jsonInput.style.borderColor = ''; });
        jsonInput.addEventListener('drop', (e) => {
            e.preventDefault(); jsonInput.style.borderColor = '';
            const file = e.dataTransfer.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (evt) => { jsonInput.value = evt.target.result; jsonInput.dispatchEvent(new Event('input')); formatJSON(); };
                reader.readAsText(file);
            }
        });

        // ===== Auto-format on paste =====
        jsonInput.addEventListener('paste', () => {
            setTimeout(() => { jsonInput.dispatchEvent(new Event('input')); formatJSON(); }, 50);
        });

        window.addEventListener('load', () => { jsonInput.focus(); });
    </script>
</body>
</html>
