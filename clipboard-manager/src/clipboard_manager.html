<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clipboard Manager</title>
<style>
:root {
    --bg-base: #ffffff;
    --bg-surface: #f5f5f7;
    --bg-overlay: #eeeef0;
    --bg-hover: #f0f0f2;
    --bg-selected: #e8edfb;
    --text-primary: #1d1d1f;
    --text-secondary: #6e6e73;
    --text-muted: #aeaeb2;
    --accent: #007aff;
    --accent-dim: rgba(0, 122, 255, 0.1);
    --yellow: #ff9f0a;
    --yellow-dim: rgba(255, 159, 10, 0.12);
    --red: #ff3b30;
    --green: #34c759;
    --green-dim: rgba(52, 199, 89, 0.1);
    --border: #e5e5ea;
    --border-light: #d1d1d6;
    --shadow: rgba(0, 0, 0, 0.06);
    --radius: 10px;
    --radius-sm: 6px;
    --transition: 0.15s ease;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', sans-serif;
    background: var(--bg-base);
    color: var(--text-primary);
    height: 100vh;
    overflow: hidden;
    user-select: none;
    -webkit-user-select: none;
}

/* ===== Draggable Titlebar Area ===== */
.titlebar {
    height: 28px;
    -webkit-app-region: drag;
    background: transparent;
    position: relative;
    z-index: 10;
}

/* ===== Main Container ===== */
.container {
    display: flex;
    flex-direction: column;
    height: calc(100vh - 28px);
    padding: 0 16px 12px;
    gap: 10px;
}

/* ===== Search Bar ===== */
.search-wrapper {
    position: relative;
    flex-shrink: 0;
}

.search-icon {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-muted);
    font-size: 14px;
    pointer-events: none;
}

#searchInput {
    width: 100%;
    height: 40px;
    background: var(--bg-surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 0 14px 0 36px;
    font-size: 14px;
    color: var(--text-primary);
    outline: none;
    transition: border-color var(--transition), box-shadow var(--transition);
    -webkit-app-region: no-drag;
}

#searchInput:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-dim);
}

#searchInput::placeholder {
    color: var(--text-muted);
}

/* ===== Tabs ===== */
.tabs {
    display: flex;
    gap: 2px;
    flex-shrink: 0;
    background: var(--bg-surface);
    border-radius: var(--radius);
    padding: 3px;
}

.tab {
    flex: 1;
    padding: 7px 12px;
    text-align: center;
    font-size: 13px;
    font-weight: 500;
    color: var(--text-secondary);
    border-radius: 7px;
    cursor: pointer;
    transition: all var(--transition);
    position: relative;
    -webkit-app-region: no-drag;
}

.tab:hover {
    color: var(--text-primary);
    background: var(--bg-hover);
}

.tab.active {
    color: var(--text-primary);
    background: var(--bg-base);
    box-shadow: 0 1px 3px var(--shadow), 0 0 0 0.5px rgba(0,0,0,0.04);
    font-weight: 600;
}

.tab .count {
    display: inline-block;
    margin-left: 4px;
    font-size: 11px;
    font-weight: 400;
    color: var(--text-muted);
    background: var(--bg-overlay);
    padding: 1px 7px;
    border-radius: 10px;
    min-width: 20px;
}

.tab.active .count {
    background: var(--accent-dim);
    color: var(--accent);
    font-weight: 500;
}

/* ===== Item List ===== */
.list-container {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    border-radius: var(--radius);
    background: var(--bg-base);
    border: 1px solid var(--border);
}

.list-container::-webkit-scrollbar {
    width: 6px;
}

.list-container::-webkit-scrollbar-track {
    background: transparent;
}

.list-container::-webkit-scrollbar-thumb {
    background: var(--border-light);
    border-radius: 3px;
}

.list-container::-webkit-scrollbar-thumb:hover {
    background: var(--text-muted);
}

.item {
    display: flex;
    align-items: center;
    padding: 10px 14px;
    cursor: pointer;
    transition: background var(--transition);
    border-bottom: 1px solid var(--border);
    gap: 10px;
    -webkit-app-region: no-drag;
}

.item:last-child {
    border-bottom: none;
}

.item:hover {
    background: var(--bg-hover);
}

.item.selected {
    background: var(--bg-selected);
    border-left: 3px solid var(--accent);
    padding-left: 11px;
}

.item-content {
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
    gap: 3px;
}

.item-text {
    font-size: 13px;
    color: var(--text-primary);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    line-height: 1.4;
}

.item-meta {
    font-size: 11px;
    color: var(--text-muted);
    display: flex;
    align-items: center;
    gap: 8px;
}

.item-actions {
    display: flex;
    gap: 4px;
    opacity: 0;
    transition: opacity var(--transition);
    flex-shrink: 0;
}

.item:hover .item-actions,
.item.selected .item-actions {
    opacity: 1;
}

.action-btn {
    width: 28px;
    height: 28px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: transparent;
    border: 1px solid transparent;
    border-radius: var(--radius-sm);
    color: var(--text-muted);
    cursor: pointer;
    font-size: 14px;
    transition: all var(--transition);
    -webkit-app-region: no-drag;
}

.action-btn:hover {
    background: var(--bg-overlay);
    border-color: var(--border);
    color: var(--text-primary);
}

.action-btn.fav-active {
    color: var(--yellow);
}

.action-btn.delete:hover {
    color: var(--red);
    background: rgba(255, 59, 48, 0.08);
    border-color: rgba(255, 59, 48, 0.2);
}

/* ===== Record/Log Styles ===== */
/* Current week editor */
.week-editor-wrapper {
    padding: 10px 14px;
    border-bottom: 2px solid var(--border);
}

.week-editor-header {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-primary);
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    justify-content: space-between;
}

.week-editor-header .badge {
    font-size: 10px;
    font-weight: 500;
    color: var(--green);
    background: var(--green-dim);
    padding: 2px 8px;
    border-radius: 10px;
}

.week-editor {
    width: 100%;
    min-height: 80px;
    max-height: 200px;
    background: var(--bg-surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 8px 10px;
    font-size: 13px;
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', sans-serif;
    color: var(--text-primary);
    line-height: 1.6;
    outline: none;
    resize: vertical;
    transition: border-color var(--transition), box-shadow var(--transition);
    -webkit-app-region: no-drag;
}

.week-editor:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-dim);
}

.week-editor::placeholder {
    color: var(--text-muted);
}

/* History weeks - collapsible */
.month-group {
    border-bottom: 1px solid var(--border);
}

.month-header {
    padding: 8px 14px;
    font-size: 13px;
    font-weight: 600;
    color: var(--text-primary);
    background: var(--bg-surface);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: space-between;
    transition: background var(--transition);
    -webkit-app-region: no-drag;
    border-bottom: 1px solid var(--border);
}

.month-header:hover {
    background: var(--bg-hover);
}

.month-header .arrow {
    font-size: 10px;
    color: var(--text-muted);
    transition: transform var(--transition);
}

.month-header .arrow.expanded {
    transform: rotate(90deg);
}

.month-content {
    display: none;
}

.month-content.expanded {
    display: block;
}

.week-item {
    cursor: pointer;
    transition: background var(--transition);
    -webkit-app-region: no-drag;
}

.week-header {
    padding: 8px 14px 8px 24px;
    font-size: 12px;
    font-weight: 500;
    color: var(--text-secondary);
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
}

.week-header:hover {
    background: var(--bg-hover);
}

.week-header .arrow {
    font-size: 10px;
    color: var(--text-muted);
    transition: transform var(--transition);
}

.week-header .arrow.expanded {
    transform: rotate(90deg);
}

.week-content {
    display: none;
    padding: 8px 14px 8px 24px;
    border-bottom: 1px solid var(--border);
}

.week-content.expanded {
    display: block;
}

.week-content-text {
    font-size: 13px;
    color: var(--text-primary);
    line-height: 1.7;
    white-space: pre-wrap;
    word-break: break-word;
    user-select: text;
    -webkit-user-select: text;
}

.week-content-text .topic {
    font-weight: 600;
    color: var(--text-primary);
}

.week-content-empty {
    font-size: 12px;
    color: var(--text-muted);
    font-style: italic;
}

/* ===== Empty State ===== */
.empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    padding: 40px;
    color: var(--text-muted);
}

.empty-icon {
    font-size: 40px;
    margin-bottom: 12px;
    opacity: 0.5;
}

.empty-text {
    font-size: 14px;
    text-align: center;
    line-height: 1.6;
}

/* ===== Footer ===== */
.footer {
    flex-shrink: 0;
    display: flex;
    justify-content: flex-end;
    align-items: center;
    padding: 6px 4px 0;
    gap: 8px;
}

.footer-btn {
    background: transparent;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 4px 10px;
    font-size: 11px;
    color: var(--text-secondary);
    cursor: pointer;
    transition: all var(--transition);
    -webkit-app-region: no-drag;
}

.footer-btn:hover {
    background: var(--bg-hover);
    border-color: var(--border-light);
    color: var(--text-primary);
}
</style>
</head>
<body>

<div class="titlebar"></div>

<div class="container">
    <!-- Search Input -->
    <div class="search-wrapper">
        <span class="search-icon" id="searchIcon">🔍</span>
        <input type="text" id="searchInput" placeholder="搜索剪切板内容..." autocomplete="off" spellcheck="false">
    </div>

    <!-- Tabs -->
    <div class="tabs" id="tabs">
        <div class="tab active" data-tab="history" onclick="switchTab('history')">
            📋 历史 <span class="count" id="historyCount">0</span>
        </div>
        <div class="tab" data-tab="favorites" onclick="switchTab('favorites')">
            ⭐ 收藏 <span class="count" id="favoritesCount">0</span>
        </div>
        <div class="tab" data-tab="record" onclick="switchTab('record')">
            📝 记录 <span class="count" id="recordCount">0</span>
        </div>
    </div>

    <!-- List -->
    <div class="list-container" id="listContainer">
        <div class="empty-state" id="emptyState">
            <div class="empty-icon">📋</div>
            <div class="empty-text">暂无剪切板记录<br>复制一些内容试试</div>
        </div>
    </div>

    <!-- Footer -->
    <div class="footer" id="footer">
        <button class="footer-btn" id="openDataFileBtn" title="查看历史数据文件">📂 数据文件</button>
    </div>
</div>

<script>
// ===== State =====
const TABS = ['history', 'favorites', 'record'];
let currentTab = 'history';
let selectedIndex = 0;
let allData = { history: [], favorites: [] };
let recordData = { weekLogs: [], currentWeekYear: 0, currentWeekNum: 0, recordFile: '' };
let filteredItems = [];
let expandedMonths = {};  // { "2026年4月": true }
let expandedWeeks = {};   // { "2026-15": true }
let weekEditorSaveTimer = null;

// ===== Get current list based on tab and filter =====
function getCurrentItems() {
    if (currentTab === 'record') {
        return []; // Record tab uses custom rendering
    }
    const items = currentTab === 'history' ? allData.history : allData.favorites;
    const query = document.getElementById('searchInput').value.toLowerCase().trim();
    if (!query) return items;
    return items.filter(item => item.content.toLowerCase().includes(query));
}

// ===== Render list =====
function renderList() {
    if (currentTab === 'record') {
        renderRecordView();
        return;
    }

    filteredItems = getCurrentItems();
    const container = document.getElementById('listContainer');

    if (filteredItems.length === 0) {
        const query = document.getElementById('searchInput').value.trim();
        const emptyIcon = currentTab === 'favorites' ? '⭐' : '📋';
        const emptyText = query
            ? '没有找到匹配的内容'
            : (currentTab === 'favorites' ? '暂无收藏内容<br>选中条目按 ⌘S 收藏' : '暂无剪切板记录<br>复制一些内容试试');
        container.innerHTML = `
            <div class="empty-state">
                <div class="empty-icon">${emptyIcon}</div>
                <div class="empty-text">${emptyText}</div>
            </div>`;
        return;
    }

    // Clamp selected index
    if (selectedIndex >= filteredItems.length) selectedIndex = filteredItems.length - 1;
    if (selectedIndex < 0) selectedIndex = 0;

    let html = '';
    filteredItems.forEach((item, index) => {
        const isSelected = index === selectedIndex;
        const time = formatTime(item.timestamp);
        const preview = escapeHtml(item.content).replace(/\n/g, ' ↵ ');
        const charCount = item.content.length;

        html += `
            <div class="item ${isSelected ? 'selected' : ''}"
                 data-index="${index}"
                 data-action="paste">
                <div class="item-content">
                    <div class="item-text">${preview}</div>
                    <div class="item-meta">
                        <span>${time}</span>
                        <span>${charCount} 字符</span>
                    </div>
                </div>
                <div class="item-actions">
                    <button class="action-btn ${item.favorite ? 'fav-active' : ''}"
                            data-action="toggleFav"
                            data-id="${item.id}"
                            title="${item.favorite ? '取消收藏' : '收藏'}">
                        ${item.favorite ? '★' : '☆'}
                    </button>
                    <button class="action-btn delete"
                            data-action="delete"
                            data-id="${item.id}"
                            title="删除">
                        ✕
                    </button>
                </div>
            </div>`;
    });

    container.innerHTML = html;
    scrollToSelected();
}

// ===== Render Record View (Current Week Editor + History) =====
function renderRecordView() {
    const container = document.getElementById('listContainer');
    const query = document.getElementById('searchInput').value.toLowerCase().trim();
    let html = '';

    // 1. Current week editor
    const weekLogs = recordData.weekLogs || [];
    const currentYear = recordData.currentWeekYear;
    const currentWeekNum = recordData.currentWeekNum;
    const currentWeekLog = weekLogs.find(w => w.year === currentYear && w.weekNum === currentWeekNum);
    const currentWeekTitle = currentWeekLog ? currentWeekLog.weekTitle : `第${currentWeekNum}周`;
    const currentWeekContent = currentWeekLog ? currentWeekLog.content : '';

    html += '<div class="week-editor-wrapper">';
    html += `<div class="week-editor-header">
        <span>${currentWeekTitle}</span>
        <span class="badge">本周</span>
    </div>`;
    html += `<textarea class="week-editor" id="weekEditor"
        placeholder="记录本周工作内容...\n\n**主题名**\n- 做了什么\n  → 结果如何"
        data-year="${currentYear}" data-week="${currentWeekNum}">${escapeHtml(currentWeekContent)}</textarea>`;
    html += '</div>';

    // 2. History weeks (excluding current week), grouped by month
    const historyLogs = weekLogs.filter(w => !(w.year === currentYear && w.weekNum === currentWeekNum));

    if (query) {
        // Search mode: show matching weeks flat
        const allSearchable = weekLogs; // search across all weeks including current
        const matchingLogs = allSearchable.filter(w => w.content.toLowerCase().includes(query));
        if (matchingLogs.length > 0) {
            matchingLogs.forEach(log => {
                const highlighted = highlightContent(log.content, query);
                const isCurrent = log.year === currentYear && log.weekNum === currentWeekNum;
                html += `<div class="week-item">
                    <div class="week-header" style="padding-left:14px;">
                        <span>${log.monthKey} ${log.weekTitle}${isCurrent ? ' <span style="color:var(--green);font-size:10px;">本周</span>' : ''}</span>
                    </div>
                    <div class="week-content expanded">
                        <div class="week-content-text">${highlighted}</div>
                    </div>
                </div>`;
            });
        } else {
            html += `<div class="empty-state" style="height:auto;padding:30px;">
                <div class="empty-icon">🔍</div>
                <div class="empty-text">没有找到匹配的记录</div>
            </div>`;
        }
    } else {
        // Group by month
        const monthGroups = groupLogsByMonth(historyLogs);
        monthGroups.forEach(group => {
            const isMonthExpanded = expandedMonths[group.monthKey] || false;
            html += `<div class="month-group">
                <div class="month-header" data-month="${group.monthKey}">
                    <span>${group.monthKey}</span>
                    <span class="arrow ${isMonthExpanded ? 'expanded' : ''}">▶</span>
                </div>
                <div class="month-content ${isMonthExpanded ? 'expanded' : ''}">`;

            group.logs.forEach(log => {
                const weekKey = `${log.year}-${log.weekNum}`;
                const isWeekExpanded = expandedWeeks[weekKey] || false;
                const contentPreview = log.content.trim()
                    ? log.content.trim().split('\n')[0].substring(0, 40) + (log.content.length > 40 ? '...' : '')
                    : '（暂无记录）';

                html += `<div class="week-item">
                    <div class="week-header" data-year="${log.year}" data-week="${log.weekNum}">
                        <span>${log.weekTitle} <span style="color:var(--text-muted);font-weight:400;margin-left:8px;">${escapeHtml(contentPreview)}</span></span>
                        <span class="arrow ${isWeekExpanded ? 'expanded' : ''}">▶</span>
                    </div>
                    <div class="week-content ${isWeekExpanded ? 'expanded' : ''}">
                        ${log.content.trim()
                            ? `<div class="week-content-text">${renderMarkdownContent(log.content)}</div>`
                            : '<div class="week-content-empty">（暂无记录）</div>'}
                    </div>
                </div>`;
            });

            html += '</div></div>';
        });
    }

    container.innerHTML = html;

    // Setup week editor auto-save
    const editor = document.getElementById('weekEditor');
    if (editor) {
        editor.addEventListener('input', function() {
            clearTimeout(weekEditorSaveTimer);
            weekEditorSaveTimer = setTimeout(() => {
                const year = parseInt(this.getAttribute('data-year'));
                const weekNum = parseInt(this.getAttribute('data-week'));
                const content = this.value;
                window.webkit.messageHandlers.updateWeekLog.postMessage({
                    year: year, weekNum: weekNum, content: content
                });
            }, 800);
        });
    }
}

function groupLogsByMonth(logs) {
    const groups = [];
    const monthMap = {};
    logs.forEach(log => {
        if (!monthMap[log.monthKey]) {
            monthMap[log.monthKey] = [];
            groups.push({ monthKey: log.monthKey, logs: monthMap[log.monthKey] });
        }
        monthMap[log.monthKey].push(log);
    });
    return groups;
}

function renderMarkdownContent(content) {
    let html = escapeHtml(content);
    // Bold: **text**
    html = html.replace(/\*\*(.+?)\*\*/g, '<span class="topic">$1</span>');
    // Links: https://...
    html = html.replace(/(https?:\/\/[^\s<]+)/g, '<a href="$1" style="color:var(--accent);text-decoration:none;font-size:12px;" title="$1">🔗 链接</a>');
    return html;
}

function highlightContent(content, query) {
    let html = escapeHtml(content);
    if (query) {
        const regex = new RegExp(`(${escapeRegex(query)})`, 'gi');
        html = html.replace(regex, '<mark style="background:var(--yellow-dim);color:var(--text-primary);padding:1px 2px;border-radius:2px;">$1</mark>');
    }
    html = html.replace(/\*\*(.+?)\*\*/g, '<span class="topic">$1</span>');
    return html;
}

function escapeRegex(str) {
    return str.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
}

// ===== Scroll to keep selected item visible =====
function scrollToSelected() {
    const container = document.getElementById('listContainer');
    const selected = container.querySelector('.item.selected');
    if (selected) {
        const containerRect = container.getBoundingClientRect();
        const itemRect = selected.getBoundingClientRect();
        if (itemRect.top < containerRect.top) {
            selected.scrollIntoView({ block: 'start', behavior: 'smooth' });
        } else if (itemRect.bottom > containerRect.bottom) {
            selected.scrollIntoView({ block: 'end', behavior: 'smooth' });
        }
    }
}

// ===== Tab switching =====
function switchTab(tab) {
    currentTab = tab;
    selectedIndex = 0;
    document.querySelectorAll('.tab').forEach(t => {
        t.classList.toggle('active', t.dataset.tab === tab);
    });
    updateInputMode();
    updateFooter();

    if (tab === 'record') {
        window.webkit.messageHandlers.getRecordData.postMessage(null);
    } else {
        renderList();
    }
}

function switchToNextTab(direction) {
    const currentIdx = TABS.indexOf(currentTab);
    const nextIdx = currentIdx + direction;
    if (nextIdx >= 0 && nextIdx < TABS.length) {
        switchTab(TABS[nextIdx]);
    }
}

function updateInputMode() {
    const input = document.getElementById('searchInput');
    const icon = document.getElementById('searchIcon');
    if (currentTab === 'record') {
        input.placeholder = '搜索记录...';
        icon.textContent = '🔍';
    } else {
        input.placeholder = '搜索剪切板内容...';
        icon.textContent = '🔍';
    }
    input.value = '';
}

function updateFooter() {
    const footer = document.getElementById('footer');
    if (currentTab === 'record') {
        footer.innerHTML = `
            <button class="footer-btn" id="openRecordFileBtn" title="查看记录文件">📝 记录文件</button>
        `;
        document.getElementById('openRecordFileBtn').addEventListener('click', function() {
            window.webkit.messageHandlers.openRecordFile.postMessage(null);
        });
    } else {
        footer.innerHTML = '<button class="footer-btn" id="openDataFileBtn" title="查看历史数据文件">📂 数据文件</button>';
        document.getElementById('openDataFileBtn').addEventListener('click', function() {
            window.webkit.messageHandlers.openDataFile.postMessage(null);
        });
    }
}

// ===== Actions =====
function pasteItem(index) {
    const item = filteredItems[index];
    if (!item) return;
    window.webkit.messageHandlers.pasteItem.postMessage({
        id: item.id,
        content: item.content
    });
}

function toggleFav(id) {
    window.webkit.messageHandlers.toggleFavorite.postMessage(id);
}

function deleteItem(id) {
    window.webkit.messageHandlers.deleteItem.postMessage(id);
}

// ===== Helper functions =====
function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

function formatTime(timestamp) {
    const date = new Date(timestamp * 1000);
    const now = new Date();
    const diff = (now - date) / 1000;

    if (diff < 60) return '刚刚';
    if (diff < 3600) return Math.floor(diff / 60) + ' 分钟前';
    if (diff < 86400) return Math.floor(diff / 3600) + ' 小时前';

    const isThisYear = date.getFullYear() === now.getFullYear();
    const month = String(date.getMonth() + 1).padStart(2, '0');
    const day = String(date.getDate()).padStart(2, '0');
    const hours = String(date.getHours()).padStart(2, '0');
    const minutes = String(date.getMinutes()).padStart(2, '0');

    if (isThisYear) {
        return `${month}-${day} ${hours}:${minutes}`;
    }
    return `${date.getFullYear()}-${month}-${day} ${hours}:${minutes}`;
}

function updateCounts() {
    document.getElementById('historyCount').textContent = allData.history.length;
    document.getElementById('favoritesCount').textContent = allData.favorites.length;
}

function updateRecordCounts() {
    const weekLogs = (recordData.weekLogs || []).filter(w => w.content && w.content.trim().length > 0);
    document.getElementById('recordCount').textContent = weekLogs.length;
}

// ===== API called from Swift =====
function refreshData(jsonStr) {
    try {
        allData = JSON.parse(jsonStr);
    } catch(e) {
        console.error('Failed to parse data:', e);
        return;
    }
    updateCounts();
    if (currentTab !== 'record') {
        renderList();
    }
}

function refreshRecordData(jsonStr) {
    try {
        recordData = JSON.parse(jsonStr);
    } catch(e) {
        console.error('Failed to parse record data:', e);
        return;
    }
    updateRecordCounts();
    updateFooter();
    if (currentTab === 'record') {
        // Preserve editor content if user is typing
        const editor = document.getElementById('weekEditor');
        if (editor && document.activeElement === editor) {
            return;
        }
        renderRecordView();
    }
}

function focusSearch() {
    const input = document.getElementById('searchInput');
    input.value = '';
    input.focus();
    selectedIndex = 0;
    renderList();
}

// ===== Keyboard handling =====
document.addEventListener('keydown', function(e) {
    // ESC - hide window
    if (e.key === 'Escape') {
        e.preventDefault();
        // If in week editor, blur it first
        const editor = document.getElementById('weekEditor');
        if (editor && document.activeElement === editor) {
            editor.blur();
            document.getElementById('searchInput').focus();
            return;
        }
        window.webkit.messageHandlers.hideWindow.postMessage(null);
        return;
    }

    // Don't handle other shortcuts if in week editor
    const weekEditor = document.getElementById('weekEditor');
    if (weekEditor && document.activeElement === weekEditor) {
        return; // Let textarea handle all its own input
    }

    // Tab key (without Cmd) - switch tabs
    if (e.key === 'Tab' && !e.metaKey && !e.ctrlKey && !e.altKey) {
        e.preventDefault();
        if (e.shiftKey) {
            switchToNextTab(-1);
        } else {
            switchToNextTab(1);
        }
        return;
    }

    // Cmd+F - focus search input
    if (e.key === 'f' && e.metaKey && !e.shiftKey) {
        e.preventDefault();
        document.getElementById('searchInput').focus();
        document.getElementById('searchInput').select();
        return;
    }

    // Cmd+S - toggle favorite (clipboard tabs only)
    if (e.key === 's' && e.metaKey && !e.shiftKey && currentTab !== 'record') {
        e.preventDefault();
        const item = filteredItems[selectedIndex];
        if (item) toggleFav(item.id);
        return;
    }

    // Arrow Up
    if (e.key === 'ArrowUp') {
        e.preventDefault();
        if (currentTab !== 'record' && filteredItems.length > 0) {
            selectedIndex = Math.max(0, selectedIndex - 1);
            renderList();
        }
        return;
    }

    // Arrow Down
    if (e.key === 'ArrowDown') {
        e.preventDefault();
        if (currentTab !== 'record' && filteredItems.length > 0) {
            selectedIndex = Math.min(filteredItems.length - 1, selectedIndex + 1);
            renderList();
        }
        return;
    }

    // Arrow Left / Right - switch tabs
    if (e.key === 'ArrowLeft' || e.key === 'ArrowRight') {
        const input = document.getElementById('searchInput');
        const isInSearch = document.activeElement === input;

        if (isInSearch) {
            if (input.value.length === 0) {
                e.preventDefault();
                switchToNextTab(e.key === 'ArrowLeft' ? -1 : 1);
            }
        } else {
            e.preventDefault();
            switchToNextTab(e.key === 'ArrowLeft' ? -1 : 1);
        }
        return;
    }

    // Enter - paste selected item (clipboard tabs only)
    if (e.key === 'Enter') {
        if (currentTab !== 'record') {
            e.preventDefault();
            if (filteredItems.length > 0) {
                pasteItem(selectedIndex);
            }
        }
        return;
    }

    // Delete/Backspace with Cmd
    if ((e.key === 'Delete' || e.key === 'Backspace') && e.metaKey) {
        e.preventDefault();
        if (currentTab !== 'record') {
            const item = filteredItems[selectedIndex];
            if (item) deleteItem(item.id);
        }
        return;
    }
});

// Prevent up/down from moving cursor in search input
document.getElementById('searchInput').addEventListener('keydown', function(e) {
    if (e.key === 'ArrowUp' || e.key === 'ArrowDown') {
        e.preventDefault();
    }
});

// Search input filtering
document.getElementById('searchInput').addEventListener('input', function() {
    selectedIndex = 0;
    renderList();
});

// Request initial data
window.addEventListener('load', function() {
    window.webkit.messageHandlers.getData.postMessage(null);
    window.webkit.messageHandlers.getRecordData.postMessage(null);
});

// ===== Event Delegation for list items =====
document.getElementById('listContainer').addEventListener('click', function(e) {
    // Month header toggle
    const monthHeader = e.target.closest('.month-header');
    if (monthHeader) {
        const monthKey = monthHeader.getAttribute('data-month');
        expandedMonths[monthKey] = !expandedMonths[monthKey];
        renderRecordView();
        return;
    }

    // Week header toggle
    const weekHeader = e.target.closest('.week-header');
    if (weekHeader) {
        const year = weekHeader.getAttribute('data-year');
        const week = weekHeader.getAttribute('data-week');
        if (year && week) {
            const weekKey = `${year}-${week}`;
            expandedWeeks[weekKey] = !expandedWeeks[weekKey];
            renderRecordView();
        }
        return;
    }

    // Clipboard action buttons
    const actionBtn = e.target.closest('[data-action="toggleFav"], [data-action="delete"]');
    if (actionBtn) {
        e.stopPropagation();
        const id = actionBtn.getAttribute('data-id');
        if (actionBtn.getAttribute('data-action') === 'toggleFav') {
            toggleFav(id);
        } else if (actionBtn.getAttribute('data-action') === 'delete') {
            deleteItem(id);
        }
        return;
    }

    // Clipboard item row (paste action)
    const itemEl = e.target.closest('.item[data-action="paste"]');
    if (itemEl) {
        const index = parseInt(itemEl.getAttribute('data-index'), 10);
        pasteItem(index);
    }
});

document.getElementById('listContainer').addEventListener('mouseover', function(e) {
    if (currentTab !== 'record') {
        const clipItem = e.target.closest('.item[data-index]');
        if (clipItem) {
            const index = parseInt(clipItem.getAttribute('data-index'), 10);
            if (index !== selectedIndex) {
                selectedIndex = index;
                renderList();
            }
        }
    }
});
</script>
